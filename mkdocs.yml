site_name: Awesome-Websites
site_url: https://alitourani.github.io/awesome-websites/
repo_url: https://github.com/alitourani/awesome-websites
repo_name: Awesome-Websites
theme:
  features:
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  name: material
  palette:
    # Dark Mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: light mode
    # Light Mode
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: dark mode
markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - md_in_html
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true